version: '3.9'

services:
  order-service-db:
    image: postgres:17.2
    container_name: order-db
    ports:
      - 5454:5432
    volumes:
      - /Users/sinha/Desktop/ecommerce/volume-data/order-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_DB: ${ORDER_DB}

  product-service-db:
    image: postgres:17.2
    container_name: product-db
    ports:
      - 5455:5432
    volumes:
      - /Users/sinha/Desktop/ecommerce/volume-data/product-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_DB: ${PRODUCT_DB}

  inventory-service-db:
    image: postgres:17.2
    container_name: inventory-db
    ports:
      - 5456:5432
    volumes:
      - /Users/sinha/Desktop/ecommerce/volume-data/inventory-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${INVENTORY_DB_PASSWORD}
      POSTGRES_USER: ${INVENTORY_DB_USER}
      POSTGRES_DB: ${INVENTORY_DB}

  category-service-db:
    image: postgres:17.2
    container_name: category-db
    ports:
      - 5457:5432
    volumes:
      - /Users/sinha/Desktop/ecommerce/volume-data/category-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${CATEGORY_DB_PASSWORD}
      POSTGRES_USER: ${CATEGORY_DB_USER}
      POSTGRES_DB: ${CATEGORY_DB}


  keycloak-db:
    image: postgres:17.2
    container_name: keycloak-db
    ports:
      - 5453:5432
    volumes:
      - /Users/sinha/Desktop/ecommerce/volume-data/keycloak-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    container_name: keycloak
    command: start
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8088
      KC_HOSTNAME_STRICT_BACKCHANNEL: false
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - 8088:8080
#    restart: always
    depends_on:
      - keycloak-db