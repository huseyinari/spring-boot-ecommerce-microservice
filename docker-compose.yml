version: '3.9'

services:
  order-service-db:
    image: postgres:17.2
    container_name: order-db
    ports:
      - 5454:5432
    volumes:
      - /Users/sinha/Desktop/ecommerce/volume-data/order-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_DB: ${ORDER_DB}

  product-service-db:
    image: postgres:17.2
    container_name: product-db
    ports:
      - 5455:5432
    volumes:
      - /Users/sinha/Desktop/ecommerce/volume-data/product-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_DB: ${PRODUCT_DB}

  inventory-service-db:
    image: postgres:17.2
    container_name: inventory-db
    ports:
      - 5456:5432
    volumes:
      - /Users/sinha/Desktop/ecommerce/volume-data/inventory-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${INVENTORY_DB_PASSWORD}
      POSTGRES_USER: ${INVENTORY_DB_USER}
      POSTGRES_DB: ${INVENTORY_DB}

  category-service-db:
    image: postgres:17.2
    container_name: category-db
    ports:
      - 5457:5432
    volumes:
      - /Users/sinha/Desktop/ecommerce/volume-data/category-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${CATEGORY_DB_PASSWORD}
      POSTGRES_USER: ${CATEGORY_DB_USER}
      POSTGRES_DB: ${CATEGORY_DB}


  keycloak-db:
    image: postgres:17.2
    container_name: keycloak-db
    ports:
      - 5453:5432
    volumes:
      - /Users/sinha/Desktop/ecommerce/volume-data/keycloak-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    container_name: keycloak
    command: start
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8088
      KC_HOSTNAME_STRICT_BACKCHANNEL: false
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - 8088:8080
#    restart: always
    depends_on:
      - keycloak-db


  zookeeper:
    image: bitnami/zookeeper:3.6.2
    container_name: zookeeper
    ports:
      - '2181:2181'
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - ecommerce-kafka-network

  kafka1:
    image: bitnami/kafka:2.7.0
    container_name: kafka1
    ports:
      - '9093:9093'
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CLIENT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_LISTENERS=CLIENT://:9092,EXTERNAL://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=CLIENT://kafka1:9092,EXTERNAL://localhost:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=CLIENT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    depends_on:
      - zookeeper
    networks:
      - ecommerce-kafka-network

  kafka2:
    image: bitnami/kafka:2.7.0
    container_name: kafka2
    ports:
      - '9094:9094'
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CLIENT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_LISTENERS=CLIENT://:9092,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=CLIENT://kafka2:9092,EXTERNAL://localhost:9094
      - KAFKA_INTER_BROKER_LISTENER_NAME=CLIENT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    depends_on:
      - zookeeper
    networks:
      - ecommerce-kafka-network

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    ports:
      - 9000:9000
    environment:
      - KAFKA_BROKERCONNECT=kafka1:9092,kafka2:9092
    depends_on:
      - kafka1
      - kafka2
    networks:
      - ecommerce-kafka-network

  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./volume-data/prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:9.5.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
#    restart: unless-stopped
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./volume-data/grafana-data:/var/lib/grafana


networks:
  ecommerce-kafka-network:
    name: ecommerce-kafka-network
    driver: bridge