spring.datasource.url=jdbc:postgresql://localhost:5456/inventory-db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=huseyinari
spring.datasource.password=Huseyinari2025*

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
#spring.jpa.open-in-view=false

# spring.datasource.initialization-mode=always

# DATABASE MIGRATION İÇİN FLYWAY VEYA LIQUIBASE DE KULLANILABİLİR
spring.sql.init.mode=always

spring.sql.init.schema-locations=classpath:db-scripts/schema.sql
spring.sql.init.data-locations=classpath:db-scripts/data-dev.sql

# actuator
# management.endpoints.web.exposure.include:*
management.endpoints.web.exposure.include=prometheus,metrics
management.metrics.export.prometheus.enabled=true

#swagger-ui
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/inventory/swagger/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/inventory/swagger
springdoc.swagger-ui.url=/inventory/swagger/v3/api-docs